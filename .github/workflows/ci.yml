name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ยกเลิก run เก่าของ branch/PR เดียวกันเมื่อมี push ใหม่ — ประหยัด runner
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test:run

      # build รวม `tsc --noEmit` อยู่แล้ว — ครอบ typecheck + vite build ในขั้นเดียว
      - name: Build
        run: bun run build
